<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG Tiny 1.2//EN" "http://www.w3.org/Graphics/SVG/1.2/DTD/svg12.dtd">
<svg version="1.2" baseProfile="tiny-ps"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1000 1000"
     width="1000" height="1000"
     id="bimi-svg">
  <title>Growfluence</title>

  <!-- Solid background - required for BIMI -->
  <rect x="0" y="0" width="1000" height="1000" rx="180" ry="180" fill="#3a2a1a"/>

  <!-- Terra accent circle top right -->
  <circle cx="700" cy="220" r="55" fill="#b05a2a" opacity="0.5"/>

  <!-- G lettermark -->
  <text
    x="500"
    y="680"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="680"
    font-weight="700"
    font-style="italic"
    fill="#b05a2a"
    text-anchor="middle">G</text>

  <!-- Thin underline accent -->
  <rect x="280" y="760" width="440" height="12" rx="6" fill="#b05a2a" opacity="0.4"/>
</svg>
